<!DOCTYPE html>
<html>
    <head>
        <title>Milk500</title>
        <link rel="stylesheet" href="{{ url_for('static',filename='css/styles.css')}}">
    </head>
    <body>
        <div class="contenedor">
            <h1>Adivinare tu número 🐄🍃</h1>
            
            <form action="{{ url_for('adivinar_numero') }}" method="POST">
                <label>Ingrese el dígito entero (1 al 10):</label>
                <input type="number" name="numero_usuario" min="1" max="10" required>
                
                <br><br>
                <button type="submit" class="formulary-button">
                    Probar suerte 🍃
                </button>
            </form>

            {% if resultado %}
                <div class="resultado">
                    <p><strong>{{ resultado }}</strong></p>
                </div>
            {% endif %}

            <br><br>
            <a href="{{ url_for('par') }}">Haz click aquí para saber cómo</a>
        </div>
    </body>
</html>
